name: Build and Push Nightly Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Only one nightly build at a time — the rolling `nightly` tag should reflect
# the newest commit on main, so cancel any in-flight build it would supersede.
concurrency:
  group: docker-nightly
  cancel-in-progress: true

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/librariarr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          # No `latest` or semver tags here — those are reserved for the
          # release-please flow that publishes stable releases from main.
          tags: |
            type=raw,value=nightly
            type=sha,prefix=nightly-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
